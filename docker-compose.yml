version: '3.8'

services:
  meta-core:
    build: .
    volumes: 
      - .:/app
      - ./plugins:/app/plugins
    env_file: 
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://meta:${POSTGRES_PASSWORD}@db:5432/metadb
    depends_on:
      - redis
      - db
    network_mode: "host"

  stt:
    image: fedirz/faster-whisper-server:latest-cpu
    environment:
      - WHISPER_MODEL=base
      - WHISPER_THREADS=1 # Allocate 1 core for i5-6500T
    ports:
      - "8001:8000"

  tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.1.4
    container_name: meta-tts
    ports:
      - "8002:8880"
    environment:
      - NUM_THREADS=1 

  redis:
    image: redis:alpine
    container_name: meta-redis

  db:
    image: ankane/pgvector:latest
    container_name: meta-db
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=metadb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  coturn:
    image: coturn/coturn
    container_name: meta-turn
    network_mode: "host"

volumes:
  postgres_data:
