version: '3.8'
services:
  meta-core:
    build: .
    volumes: [".:/app", "./plugins:/app/plugins"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://meta:pass@db:5432/metadb
      - STT_URL=http://stt:8000
      - TTS_URL=http://tts:8000
    env_file: .env
    depends_on: [redis, db, stt, tts]
    network_mode: "host"

  stt:
    image: fedirz/faster-whisper-server:latest-cpu
    environment:
      - WHISPER_MODEL=base
      - WHISPER_THREADS=1 # Allocate 1 core
    ports: ["8001:8000"]

  tts:
    image: kokoro-onnx-cpu:latest
    environment:
      - NUM_THREADS=1 # Allocate 1 core
    ports: ["8002:8000"]

  redis:
    image: redis:alpine

  db:
    image: ankane/pgvector:latest
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=metadb
    volumes: ["postgres_data:/var/lib/postgresql/data"]

  coturn:
    image: coturn/coturn
    network_mode: "host"

volumes:
  postgres_data:
